<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>☠ SmokeTracker</title>

<link rel="manifest" href='data:application/json,{"name":"SmokeTracker","short_name":"SmokeTracker","start_url":".","display":"standalone","background_color":"#1a1a2e","theme_color":"#1a1a2e","icons":[{"src":"icon-192.png","sizes":"192x192","type":"image/png"}]}'>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root { --bg: #1a1a2e; --accent: #ffd700; --text: #fff; --card: rgba(255,255,255,0.08); --card-border: rgba(255,255,255,0.15); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Courier Prime', monospace; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 80px; }
  
  /* POSITION TEXTE BOUTON (Requête : entre bas crâne et bas cercle) */
  .smoke-btn-container { position: relative; width: 220px; height: 220px; margin: 30px auto; }
  .smoke-btn { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--accent); background: none; color: var(--accent); font-size: 80px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding-bottom: 20px; }
  .skull-label { position: absolute; bottom: 45px; width: 100%; text-align: center; font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 2px; color: var(--accent); pointer-events: none; }

  /* GRILLE LANGUES 3x4 (Requête utilisateur) */
  .lang-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
  .lang-item { background: var(--card); border: 1px solid var(--card-border); padding: 12px 5px; border-radius: 8px; text-align: center; cursor: pointer; font-size: 11px; }
  .lang-item.active { border-color: var(--accent); background: rgba(255,215,0,0.1); }
  .flag { display: block; font-size: 20px; margin-bottom: 4px; }

  /* STATS PIE CHART */
  .chart-container { width: 90%; margin: 20px auto; background: var(--card); border-radius: 15px; padding: 15px; }
  .stat-label { font-size: 14px; text-align: center; color: var(--accent); margin-bottom: 10px; }
  .stat-value { font-size: 48px; text-align: center; font-family: 'Bebas Neue'; }

  /* NAVIGATION & VIEWS */
  .view { display: none; padding: 20px; animation: fadeIn 0.3s; }
  .view.active { display: block; }
  nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid var(--card-border); }
  nav button { background: none; border: none; color: #666; font-family: 'Bebas Neue'; font-size: 16px; }
  nav button.active { color: var(--accent); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div id="view-home" class="view active">
  <div class="stat-label" id="txt-last24">CIG DERNIÈRES 24H</div>
  <div class="stat-value" id="val-24h">0</div>
  <div class="smoke-btn-container">
    <div class="skull-label" id="txt-smoke">FUME</div>
    <button class="smoke-btn" onclick="smoke()">☠</button>
  </div>
</div>

<div id="view-stats" class="view">
  <div class="stat-label">RÉPARTITION MOYENNE / 7J</div>
  <div class="chart-container"><canvas id="pieChart"></canvas></div>
</div>

<div id="view-settings" class="view">
  <div class="stat-label">LANGUAGES</div>
  <div class="lang-grid" id="langGrid"></div>
  <button onclick="openManual()" id="btn-manual" style="width:100%; padding:15px; background:var(--card); border:1px solid var(--accent); color:var(--text); border-radius:8px; margin-top:20px;">📖 MANUEL</button>
  <button onclick="resetData()" style="width:100%; padding:10px; background:none; border:none; color:#f44; margin-top:30px; font-size:12px;">EFFACER LES DONNÉES</button>
</div>

<nav>
  <button onclick="showView('home')" id="nav-home">HOME</button>
  <button onclick="showView('stats')" id="nav-stats">STATS</button>
  <button onclick="showView('settings')" id="nav-settings">RÉGLAGES</button>
</nav>

<script>
let cigarettes = [];
let currentLang = localStorage.getItem('smoketracker_lang') || 'fr';
let chart;

const LANGUAGES = [
  { c: 'fr', f: '🇫🇷', n: 'FR' }, { c: 'en', f: '🇬🇧', n: 'EN' }, { c: 'es', f: '🇪🇸', n: 'ES' },
  { c: 'de', f: '🇩🇪', n: 'DE' }, { c: 'it', f: '🇮🇹', n: 'IT' }, { c: 'pt', f: '🇵🇹', n: 'PT' },
  { c: 'nl', f: '🇳🇱', n: 'NL' }, { c: 'ru', f: '🇷🇺', n: 'RU' }, { c: 'zh', f: '🇨🇳', n: 'ZH' },
  { c: 'ja', f: '🇯🇵', n: 'JA' }, { c: 'ar', f: '🇸🇦', n: 'AR' }, { c: 'ko', f: '🇰🇷', n: 'KO' }
];

const STRINGS = {
  fr: { last24: "CIG DERNIÈRES 24H", smoke: "FUME", settings: "RÉGLAGES" },
  en: { last24: "CIG LAST 24H", smoke: "SMOKE", settings: "SETTINGS" },
  es: { last24: "CIG ÚLTIMAS 24H", smoke: "FUMA", settings: "AJUSTES" }
  // Les autres langues sont gérées par défaut ou à compléter
};

function generateDemo() {
  let demo = [];
  const now = Date.now();
  for(let i=0; i<18; i++) demo.push({ t: now - (i * 3600000) }); // 18 cig last 24h
  for(let i=0; i<32; i++) demo.push({ t: now - (3*86400000) - (i*600000) }); // Pic il y a 3j
  return demo;
}

function load() {
  const saved = localStorage.getItem('cigarettes');
  cigarettes = saved ? JSON.parse(saved) : generateDemo();
  updateUI();
  renderLangGrid();
}

function smoke() {
  cigarettes.push({ t: Date.now() });
  localStorage.setItem('cigarettes', JSON.stringify(cigarettes));
  if(navigator.vibrate) navigator.vibrate(50);
  updateUI();
}

function updateUI() {
  const now = Date.now();
  const last24 = cigarettes.filter(c => now - c.t < 86400000).length;
  document.getElementById('val-24h').innerText = last24;
  
  const t = STRINGS[currentLang] || STRINGS.en;
  document.getElementById('txt-last24').innerText = t.last24;
  document.getElementById('txt-smoke').innerText = t.smoke;
  
  if (document.getElementById('view-stats').classList.contains('active')) updatePie();
}

function updatePie() {
  const ctx = document.getElementById('pieChart').getContext('2d');
  const last7 = cigarettes.filter(c => Date.now() - c.t < 7 * 86400000);
  const slots = [0, 0, 0, 0]; // 00-06, 06-12, 12-18, 18-00
  
  last7.forEach(c => {
    const h = new Date(c.t).getHours();
    if(h < 6) slots[0]++; else if(h < 12) slots[1]++; else if(h < 18) slots[2]++; else slots[3]++;
  });

  const avg = slots.map(v => (v / 7).toFixed(1));

  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['00-06h', '06-12h', '12-18h', '18-00h'],
      datasets: [{ data: avg, backgroundColor: ['#2c3e50', '#f1c40f', '#e67e22', '#34495e'], borderWidth: 0 }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
  });
}

function renderLangGrid() {
  const grid = document.getElementById('langGrid');
  grid.innerHTML = LANGUAGES.map(l => `
    <div class="lang-item ${currentLang === l.c ? 'active' : ''}" onclick="setLang('${l.c}')">
      <span class="flag">${l.f}</span> ${l.n}
    </div>
  `).join('');
}

function setLang(c) {
  currentLang = c;
  localStorage.setItem('smoketracker_lang', c);
  updateUI();
  renderLangGrid();
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  if(v === 'stats') updatePie();
}

function resetData() { if(confirm("Effacer tout ?")) { localStorage.clear(); location.reload(); } }

window.onload = load;
</script>
</body>
</html>
